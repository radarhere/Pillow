name: Test

on: [push, pull_request]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [
          "ubuntu-latest",
          "macOS-latest",
        ]
        python-version: [
          "3.6",
        ]
        include:
        - python-version: "3.5"
          env: PYTHONOPTIMIZE=2
        - python-version: "3.6"
          env: PYTHONOPTIMIZE=1
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}

    steps:
    - uses: actions/checkout@v1

    - name: Ubuntu cache
      uses: actions/cache@v1
      if: startsWith(matrix.os, 'ubuntu')
      with:
        path: ~/.cache/pip
        key:
          ${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('**/.travis/*.sh') }}
        restore-keys: |
          ${{ matrix.os }}-${{ matrix.python-version }}-

    - name: macOS cache
      uses: actions/cache@v1
      if: startsWith(matrix.os, 'macOS')
      with:
        path: ~/Library/Caches/pip
        key:
          ${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('**/.travis/*.sh') }}
        restore-keys: |
          ${{ matrix.os }}-${{ matrix.python-version }}-

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v1
      with:
        python-version: ${{ matrix.python-version }}

    - name: Build system information
      run: python .github/workflows/system-info.py

    - name: Docs
      if: matrix.python-version == 3.6
      run: |
        sudo apt-get -qq install python3.7 python3.7-tk tk-dev
        python3.7 -m pip install setuptools
        python3.7 -m pip install https://github.com/readthedocs/sphinx_rtd_theme/archive/a49a812.zip
        export PATH="/usr/lib/python3.7/bin:$PATH"
        ls /usr/lib/python3.7
        find /usr/lib/python3.7 -iname bin
        find / -iname bin
        make doccheck

    - name: After success
      if: success()
      run: |
        .travis/after_success.sh
      env:
        MATRIX_OS: ${{ matrix.os }}
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

    - name: Upload coverage
      if: success()
      uses: codecov/codecov-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        name: ${{ matrix.os }} Python ${{ matrix.python-version }}
