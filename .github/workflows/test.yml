name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  COVERAGE_CORE: sysmon
  FORCE_COLOR: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        libavif: [
          "1.3.0",
          "1.4.0",
        ]

    runs-on: "ubuntu-latest"
    name: libavif ${{ matrix.libavif }}

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: 3.14
        cache: pip
        cache-dependency-path: |
          ".ci/*.sh"
          "pyproject.toml"

    - name: Build system information
      run: python3 .github/workflows/system-info.py

    - name: Cache libavif
      uses: actions/cache@v5
      id: cache-libavif
      with:
        path: ~/cache-libavif
        key: ${{ matrix.libavif }}-libavif-${{ hashFiles('depends/install_libavif.sh') }}

    - name: Install Linux dependencies
      run: |
        .ci/install.sh
      env:
        GHA_PYTHON_VERSION: 3.14
        GHA_LIBAVIF: ${{ matrix.libavif }}

    - name: Build
      run: |
        .ci/build.sh

    - name: Test
      run: |
        python3 demo.py
